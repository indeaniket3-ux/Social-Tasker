<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Social Tasker turns social messages into prioritized daily tasks."
    />
    <title>Social Tasker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="Social Tasker workspace">
        <header class="topbar">
          <div>
            <p class="date-label" id="todayLabel">Today</p>
            <h1>Social Tasker</h1>
          </div>
          <div class="status-pill" id="syncStatus">
            <span class="status-dot"></span>
            Local workspace
          </div>
        </header>

        <section class="summary-grid" aria-label="Daily summary">
          <article class="summary-panel priority-panel">
            <div>
              <p class="eyebrow">Daily focus</p>
              <h2 id="focusTitle">Build your plan</h2>
              <p id="focusSubtitle">Add tasks or messages to generate a priority queue.</p>
            </div>
            <div class="progress-ring" aria-label="Completion progress">
              <span id="progressValue">0%</span>
            </div>
          </article>
          <article class="summary-panel metric-panel">
            <p class="eyebrow">Tasks</p>
            <strong id="taskCount">0</strong>
            <span id="taskMeta">0 high priority</span>
          </article>
          <article class="summary-panel metric-panel">
            <p class="eyebrow">Unread</p>
            <strong id="unreadCount">0</strong>
            <span id="messageMeta">0 social alerts</span>
          </article>
        </section>

        <section class="columns">
          <section class="panel task-panel" aria-labelledby="taskHeading">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Planner</p>
                <h2 id="taskHeading">Tasks</h2>
              </div>
              <button class="icon-button" id="clearDoneButton" title="Clear completed tasks" aria-label="Clear completed tasks">
                <span aria-hidden="true">✓</span>
              </button>
            </div>

            <form class="task-form" id="taskForm">
              <label>
                <span>Task title</span>
                <input id="taskTitle" name="title" placeholder="Reply to Maya about campaign brief" required />
              </label>
              <div class="form-row">
                <label>
                  <span>Category</span>
                  <select id="taskCategory" name="category">
                    <option>Social</option>
                    <option>Work</option>
                    <option>Personal</option>
                    <option>Finance</option>
                  </select>
                </label>
                <label>
                  <span>Priority</span>
                  <select id="taskPriority" name="priority">
                    <option>High</option>
                    <option selected>Medium</option>
                    <option>Low</option>
                  </select>
                </label>
              </div>
              <div class="form-row">
                <label>
                  <span>Due</span>
                  <input id="taskDue" name="due" type="date" />
                </label>
                <label>
                  <span>Minutes</span>
                  <input id="taskMinutes" name="minutes" type="number" min="5" max="240" step="5" value="25" />
                </label>
              </div>
              <button class="primary-button" type="submit">Add task</button>
            </form>

            <div class="filters" aria-label="Task filters">
              <button class="filter-chip active" data-filter="all">All</button>
              <button class="filter-chip" data-filter="open">Open</button>
              <button class="filter-chip" data-filter="high">High</button>
              <button class="filter-chip" data-filter="done">Done</button>
            </div>

            <div class="task-list" id="taskList" aria-live="polite"></div>
          </section>

          <section class="panel inbox-panel" aria-labelledby="inboxHeading">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Inbox</p>
                <h2 id="inboxHeading">Social alerts</h2>
              </div>
              <button class="icon-button" id="markReadButton" title="Mark all messages read" aria-label="Mark all messages read">
                <span aria-hidden="true">○</span>
              </button>
            </div>

            <form class="message-form" id="messageForm">
              <div class="form-row">
                <label>
                  <span>Sender</span>
                  <input id="messageSender" name="sender" placeholder="Anika" required />
                </label>
                <label>
                  <span>Platform</span>
                  <select id="messagePlatform" name="platform">
                    <option>Instagram</option>
                    <option>Snapchat</option>
                    <option>WhatsApp</option>
                    <option>LinkedIn</option>
                  </select>
                </label>
              </div>
              <label>
                <span>Message</span>
                <textarea id="messageText" name="text" rows="3" placeholder="Can you review the reel captions before 5?" required></textarea>
              </label>
              <button class="secondary-button" type="submit">Capture alert</button>
            </form>

            <div class="message-actions">
              <button id="seedMessagesButton" type="button">Add sample alerts</button>
              <button id="clearMessagesButton" type="button">Clear stream</button>
            </div>
            <div class="message-list" id="messageList" aria-live="polite"></div>
          </section>

          <aside class="panel insight-panel" aria-labelledby="insightHeading">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Assistant</p>
                <h2 id="insightHeading">Next actions</h2>
              </div>
              <button class="icon-button" id="refreshSuggestionsButton" title="Refresh suggestions" aria-label="Refresh suggestions">
                <span aria-hidden="true">↻</span>
              </button>
            </div>
            <div class="assistant-visual" aria-hidden="true">
              <img src="./assets/social-tasker-preview.svg" alt="" />
            </div>
            <div id="suggestionList" class="suggestion-list"></div>
          </aside>
        </section>
      </section>
    </main>

    <script src="./assets/app.js" defer></script>
  </body>
</html>
